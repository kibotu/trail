appId: net.kibotu.trail
---

# App must be launched before running this flow (the Python script handles it).

# ── Home Screen ──────────────────────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: Home
    timeout: 10000
- takeScreenshot: screen_home

# ── Entry Detail ─────────────────────────────────────────────────────
# Tap the right-side padding area of the first entry card body. At 88%
# horizontal we land inside the card but in its internal padding — away
# from text, tags, links, avatar, and action buttons — so the Card's own
# onCardClick fires and opens entry detail.
- tapOn:
    point: "88%,18%"
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: Back
    timeout: 10000
- takeScreenshot: screen_detail

# ── My Feed ──────────────────────────────────────────────────────────
- back
- waitForAnimationToEnd:
    timeout: 3000
- tapOn: My Feed
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "What are you working on?"
    timeout: 10000
- takeScreenshot: screen_myfeed

# ── Profile ──────────────────────────────────────────────────────────
- tapOn: Profile
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Profile picture"
    timeout: 10000
- takeScreenshot: screen_profile

# ── Notifications ────────────────────────────────────────────────────
- tapOn: Alerts
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: Alerts
    timeout: 10000
- takeScreenshot: screen_notifications

# ── Search (with query) ──────────────────────────────────────────────
- tapOn: Home
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    point: "90%,95%"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Search entries or #hashtags..."
- inputText: "#ai-prompts"
- waitForAnimationToEnd:
    timeout: 2000
- hideKeyboard
- extendedWaitUntil:
    visible: "#ai-prompts"
    timeout: 10000
- takeScreenshot: screen_search
