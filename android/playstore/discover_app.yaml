appId: net.kibotu.trail
---

- openLink: https://trail.services.kibotu.net

# ── Home Screen ──────────────────────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: Home
    timeout: 10000
- assertVisible: Home

# ── Entry Detail ─────────────────────────────────────────────────────
# Tap the right-side padding of the first entry card at header height.
# 75% horizontal lands between the timestamp and the 3-dots menu,
# 12% vertical sits in the card header row — safely away from text,
# links, tags, and action buttons.
- tapOn:
    point: "75%,12%"
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: Back
    timeout: 10000
- assertVisible: Back

# ── Back to Home ─────────────────────────────────────────────────────
- back
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: Home

# ── Scroll Home feed ─────────────────────────────────────────────────
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 2000

# ── My Feed ──────────────────────────────────────────────────────────
- tapOn: My Feed
- waitForAnimationToEnd:
    timeout: 3000
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "What are you working on?"
    timeout: 10000
- assertVisible: "What are you working on?"
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 2000

# ── Post a dad joke ─────────────────────────────────────────────────
- tapOn: "What are you working on?"
- inputText: "Why did Twitter change its name? Because it couldn't handle the pressure of 280 characters... oh wait, that's still a thing here."
- waitForAnimationToEnd:
    timeout: 1000
- hideKeyboard
- tapOn: Post
- waitForAnimationToEnd:
    timeout: 5000

# ── Delete the posted entry ─────────────────────────────────────────
# Scroll to top so the new post is visible, then tap its 3-dots menu.
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "93%,35%"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: Delete
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Delete Entry?"
- tapOn: Delete
- waitForAnimationToEnd:
    timeout: 3000

# ── Profile ──────────────────────────────────────────────────────────
- tapOn: Profile
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Profile picture"
    timeout: 10000
- assertVisible: "Profile picture"
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- waitForAnimationToEnd:
    timeout: 2000

# ── Alerts ───────────────────────────────────────────────────────────
- tapOn: Alerts
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: Alerts
    timeout: 10000
- assertVisible: Alerts

# ── Search ───────────────────────────────────────────────────────────
- tapOn: Home
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    point: "90%,95%"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Search entries or #hashtags..."
- inputText: "#ai-prompts"
- waitForAnimationToEnd:
    timeout: 2000
- hideKeyboard
- extendedWaitUntil:
    visible: "#ai-prompts"
    timeout: 10000
- assertVisible: "#ai-prompts"
