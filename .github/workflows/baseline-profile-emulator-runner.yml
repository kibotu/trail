name: Generate Baseline Profile (Emulator Runner)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: baseline-profile-emulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-baseline-profile:
    name: Generate Baseline Profile
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          mkdir -p certificates
          keytool -genkeypair -v \
            -keystore certificates/debug.jks \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"

      - name: Create local.properties
        working-directory: android
        run: |
          printf '%s\n' \
            'API_BASE_URL=http://localhost/' \
            'DEBUG_KEYSTORE_PATH=certificates/debug.jks' \
            'DEBUG_STORE_PASSWORD=android' \
            'DEBUG_KEY_PASSWORD=android' \
            'DEBUG_KEYSTORE_ALIAS=androiddebugkey' \
            > local.properties

      - name: Create dummy google-services.json
        working-directory: android
        run: |
          cat > app/google-services.json <<'EOJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "net.kibotu.trail" }
                },
                "api_key": [ { "current_key": "dummy-key" } ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOJSON

      - name: Build app APK
        working-directory: android
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Build benchmark APK
        working-directory: android
        run: ./gradlew :baselineprofile:assembleRelease --no-daemon

      - name: Run baseline profile generation with emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: aosp_atd
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          script: cd android && ./gradlew :app:generateBaselineProfile --no-daemon --stacktrace

      - name: Upload Baseline Profile
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-profile
          path: android/app/src/main/baseline-prof.txt
          retention-days: 14

      - name: Check for profile changes
        id: profile-changes
        run: |
          if [ -n "$(git status --porcelain android/app/src/main/baseline-prof.txt)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push baseline profile
        if: steps.profile-changes.outputs.changes == 'true' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/baseline-prof.txt
          git commit -m "Update baseline profile"
          git push
