name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode and setup release keystore
        working-directory: android/app
        run: |
          mkdir -p certificates
          echo "${{ secrets.STORE_KEYSTORE_FILE }}" | base64 -d > certificates/store.jks

      - name: Create google-services.json
        working-directory: android/app
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Create local.properties
        working-directory: android
        run: |
          printf '%s\n' \
            'API_BASE_URL=https://trail.services.kibotu.net/' \
            'RELEASE_KEYSTORE_PATH=certificates/store.jks' \
            'RELEASE_KEYSTORE_ALIAS=release' \
            'RELEASE_STORE_PASSWORD=${{ secrets.STORE_STORE_PASSWORD }}' \
            'RELEASE_KEY_PASSWORD=${{ secrets.STORE_KEY_PASSWORD }}' \
            > local.properties

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # Extract version code: MAJOR * 10000000 + MINOR * 100000 + HOTFIX * 1000 + BUILD_NUMBER
          IFS='.' read -r major minor hotfix <<< "$VERSION"
          BUILD_NUMBER=${{ github.run_number }}
          VERSION_CODE=$((major * 10000000 + minor * 100000 + hotfix * 1000 + BUILD_NUMBER))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -PversionName=${{ steps.version.outputs.VERSION }} -PversionCode=${{ steps.version.outputs.VERSION_CODE }} -Porg.gradle.offline=false --no-daemon --stacktrace

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease -PversionName=${{ steps.version.outputs.VERSION }} -PversionCode=${{ steps.version.outputs.VERSION_CODE }} -Porg.gradle.offline=false --no-daemon --stacktrace

      - name: Rename artifacts
        working-directory: android/app/build/outputs
        run: |
          # Rename APK
          mv apk/release/app-release.apk apk/release/trail-${{ steps.version.outputs.VERSION }}.apk
          
          # Rename AAB
          mv bundle/release/app-release.aab bundle/release/trail-${{ steps.version.outputs.VERSION }}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/trail-${{ steps.version.outputs.VERSION }}.apk
            android/app/build/outputs/bundle/release/trail-${{ steps.version.outputs.VERSION }}.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
