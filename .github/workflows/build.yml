name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          mkdir -p certificates
          keytool -genkeypair -v \
            -keystore certificates/debug.jks \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"

      - name: Create local.properties
        working-directory: android
        run: |
          printf '%s\n' \
            'API_BASE_URL=http://localhost/' \
            'DEBUG_KEYSTORE_PATH=certificates/debug.jks' \
            'DEBUG_STORE_PASSWORD=android' \
            'DEBUG_KEY_PASSWORD=android' \
            'DEBUG_KEYSTORE_ALIAS=androiddebugkey' \
            > local.properties

      - name: Create dummy google-services.json
        working-directory: android/app
        run: |
          cat > google-services.json <<'EOJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "net.kibotu.trail" }
                },
                "api_key": [ { "current_key": "dummy-key" } ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOJSON

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug -Porg.gradle.offline=false --no-daemon --stacktrace

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest -Porg.gradle.offline=false --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
