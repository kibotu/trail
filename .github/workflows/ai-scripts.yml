name: AI Scripts

on:
  schedule:
    # https://crontab.guru/#0_10_*_*_*
    - cron: '0 10 * * *'
    # https://crontab.guru/#30_19_*_*_*
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Restore script caches
        uses: actions/cache@v4
        with:
          path: |
            topic-generation/.tag_generation_cache.json
            entry-rewriter/.entry_rewrite_cache.json
          key: ai-scripts-cache-${{ github.run_id }}
          restore-keys: ai-scripts-cache-

      - name: Generate tags
        working-directory: topic-generation
        run: uv run generate_tags.py --api-key ${{ secrets.KIBOTU_TRAIL_API_TOKEN }}

      - name: Rewrite entries
        working-directory: entry-rewriter
        run: uv run rewrite_entry.py --api-key ${{ secrets.KIBOTU_TRAIL_API_TOKEN }}
